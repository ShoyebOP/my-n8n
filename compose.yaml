services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    # bind to 127.0.0.1 so it's only accessible from the host
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=${CODESPACE_NAME}-5678.app.github.dev
      # Explicitly set the editor's base URL
      - N8N_EDITOR_BASE_URL=https://${CODESPACE_NAME}-5678.app.github.dev/

      # Still good practice for WebSocket stability
      - N8N_WEBSOCKET_TUNNEL_URL=https://${CODESPACE_NAME}-5678.app.github.dev/

      # THE KEY FIX: This tells n8n to trust the proxy headers from Codespaces
      - N8N_TRUST_PROXY=1

      # --- THE NEW, CRITICAL FIX ---
      # This tells n8n to allow the browser to connect from this specific URL.
      - N8N_CORS_ALLOWED_ORIGINS=https://${CODESPACE_NAME}-5678.app.github.dev

      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_RUNNERS_ENABLED=true
      - NODE_ENV=production
      - WEBHOOK_URL=https://${CODESPACE_NAME}-5678.app.github.dev/
      - GENERIC_TIMEZONE=Asia/Dhaka
      - TZ=Asia/Dhaka
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/home/node/files
    networks:
      - n8n-internal

  pandoc-service:
    build:
      context: .
      dockerfile: ./pandoc-service/Dockerfile
    restart: always
    container_name: pandoc-service
    volumes:
      - ./local-files:/files
    networks:
      - n8n-internal

  ytdlp-service:
    build:
      context: .
      dockerfile: ./ytdlp-service/Dockerfile
    restart: always
    container_name: ytdlp-service
    volumes:
      # Mount the shared volume so it can download files there
      - ./local-files:/files
    networks:
      - n8n-internal
      
  puppeteer-service:
    build:
      context: .
      dockerfile: ./puppeteer-service/Dockerfile
    restart: always
    container_name: puppeteer-service
    volumes:
      - ./local-files:/files
    networks:
      - n8n-internal

  vimeo-scraper:
    build:
      context: .
      dockerfile: ./vimeo-scraper/Dockerfile
    restart: always
    container_name: vimeo-service
    volumes:
      # Mount the shared volume so it can download files there
      - ./local-files:/files
    networks:
      - n8n-internal

volumes:
  n8n_data:

networks:
  n8n-internal:
