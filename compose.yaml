version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      # --- START: COMMUNITY-VETTED SOLUTION ---

      # 1. This tells n8n its full public address. It is essential.
      - N8N_PUBLIC_URL=https://${CODESPACE_NAME}-5678.app.github.dev/

      # 2. THE KEY FIX from the community. This tells n8n HOW MANY layers of
      #    proxies to trust. For Codespaces, '1' is the correct value.
      - N8N_PROXY_HOPS=1

      # --- Your other settings ---
      - N8N_PORT=5678
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Asia/Dhaka
      - TZ=Asia/Dhaka
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/home/node/files # Kept your original path
    networks:
      - n8n-internal

  pandoc-service:
    build:
      context: .
      dockerfile: ./pandoc-service/Dockerfile
    restart: always
    container_name: pandoc-service
    volumes:
      - ./local-files:/files
    networks:
      - n8n-internal

  ytdlp-service:
    build:
      context: .
      dockerfile: ./ytdlp-service/Dockerfile
    restart: always
    container_name: ytdlp-service
    volumes:
      - ./local-files:/files
    networks:
      - n8n-internal
      
  puppeteer-service:
    build:
      context: .
      dockerfile: ./puppeteer-service/Dockerfile
    restart: always
    container_name: puppeteer-service
    volumes:
      - ./local-files:/files
    networks:
      - n8n-internal

  vimeo-scraper:
    build:
      context: .
      dockerfile: ./vimeo-scraper/Dockerfile
    restart: always
    container_name: vimeo-service
    volumes:
      - ./local-files:/files
    networks:
      - n8n-internal

volumes:
  n8n_data:

networks:
  n8n-internal:
